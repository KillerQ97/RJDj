<!DOCTYPE html>
<html>
<head>
    <title>RJDj Scene: Deep Dive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Helvetica Neue', sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #visual { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.3; z-index: -1; }
        button { padding: 30px; font-size: 1rem; background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; color: #00d4ff; cursor: pointer; border-radius: 5px; backdrop-filter: blur(10px); }
        #versionTag { position: absolute; bottom: 10px; right: 10px; font-size: 10px; font-family: monospace; opacity: 0.4; }
    </style>
</head>
<body>
    <canvas id="visual"></canvas>
    <button id="startBtn">INITIALIZE SCENE</button>
    <div id="versionTag">BUILD v<span id="vNum">0</span></div>

    <script>
        // --- VERSION TRACKING ---
        let currentV = parseFloat(localStorage.getItem('appVersion') || "2.0");
        currentV = (currentV + 0.1).toFixed(1);
        localStorage.setItem('appVersion', currentV);
        document.getElementById('vNum').innerText = currentV;

        const startBtn = document.getElementById('startBtn');
        let audioCtx;

        startBtn.addEventListener('click', async () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const micSource = audioCtx.createMediaStreamSource(stream);

                // --- 1. THE CHILL BACKGROUND SYNTH ---
                // Generates a low, pulsing C-minor pad
                const createDrone = (freq, vol) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    const lfo = audioCtx.createOscillator();
                    const lfoGain = audioCtx.createGain();

                    osc.type = 'sawtooth';
                    osc.frequency.value = freq;
                    lfo.frequency.value = 0.2; 
                    lfoGain.gain.value = 0.005;

                    gain.gain.value = vol;
                    const filter = audioCtx.createBiquadFilter();
                    filter.frequency.value = 400;

                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.detune);
                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.start();
                    lfo.start();
                };

                // Play C2 and G2 for a perfect fifth drone
                createDrone(65.41, 0.05); 
                createDrone(98.00, 0.03);

                // --- 2. THE SENSITIVE REACTIVE MIC ---
                const micFilter = audioCtx.createBiquadFilter();
                micFilter.type = "bandpass";
                micFilter.frequency.value = 800; // Focus on vocal/clapping range
                micFilter.Q.value = 1;

                const delay = audioCtx.createDelay(1.0);
                delay.delayTime.value = 0.5;

                const feedback = audioCtx.createGain();
                feedback.gain.value = 0.6; // High sensitivity

                // Resonance: Makes mic sounds "sing" in C
                const resonance = audioCtx.createBiquadFilter();
                resonance.type = "peaking";
                resonance.frequency.value = 523.25; // High C
                resonance.gain.value = 20;

                micSource.connect(micFilter);
                micFilter.connect(delay);
                delay.connect(resonance);
                resonance.connect(feedback);
                feedback.connect(delay);
                delay.connect(audioCtx.destination);

                startBtn.innerText = "SCENE ACTIVE";
                startBtn.style.opacity = "0";

            } catch (err) {
                alert("Please use Safari and enable Mic.");
            }
        });
    </script>
</body>
</html>
